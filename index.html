<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* MAIN */
.container {
  text-align: center;
  max-width: 700px;
  width: 90%;
}

/* TITLE */
h1 {
  font-size: 36px;
  color: #ff4d6d;
}

/* INPUT */
input {
  width: 80%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

/* BOOM */
#boom {
  display: none;
  font-size: 42px;
  color: #ff4d6d;
  font-weight: bold;
  animation: fadeIn 1.5s ease;
}

/* FADE */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* QUESTION */
#question {
  display: none;
  margin-top: 20px;
}

/* VIDEO */
video {
  display: none;
  width: 100%;
  border-radius: 20px;
  margin-top: 20px;
}

/* LETTER */
#message {
  display: none;
  background: white;
  padding: 30px;
  border-radius: 20px;
  margin-top: 20px;
  text-align: left;
  line-height: 1.8;
  max-height: 300px;
  overflow-y: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* CLICK BUTTON */
#revealBtn {
  display: none;
}

/* FINAL */
#ending {
  display: none;
  font-size: 28px;
  color: #ff4d6d;
  margin-top: 30px;
  font-weight: bold;
  text-align: center;
}

/* POPUP */
#popup {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 15px;
  display: none;
  font-size: 18px;
}

/* рЯМЄ PETALS */
.petal {
  position: fixed;
  top: -10px;
  width: 15px;
  height: 15px;
  background: radial-gradient(circle, #ffb6c1, #ff4d6d);
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  opacity: 0.7;
  animation: fall linear forwards;
}

@keyframes fall {
  0% {
    transform: translateY(0) rotate(45deg);
    opacity: 0.8;
  }
  100% {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

// рЯМЄ PETALS
setInterval(()=>{

// popup
function pop(msg){
  let p=document.getElementById("popup");
  p.innerText=msg;
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2000);
}

// check date
function checkDate(){
  let d=document.getElementById("date").value.toLowerCase();

  if(d==="september 10"||d==="september 10, 2025"){

    document.getElementById("title").style.display="none";
    document.getElementById("date").style.display="none";

// question

// start

  v.play();

  setTimeout(()=>{
