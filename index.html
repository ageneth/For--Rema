<!DOCTYPE html>
<html>
<head>
  <title>For Rema ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      overflow-x: hidden;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 25px;
      max-width: 700px;
      margin: 60px auto;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      transition: 1s;
    }

    h1 {
      color: #ff4d6d;
      font-size: 34px;
    }

    input {
      padding: 14px;
      width: 70%;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 12px 25px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #e60039;
    }

    #shortMessage {
      font-size: 34px;
      color: #ff4d6d;
      margin-top: 30px;
      display: none;
      opacity: 0;
      transform: scale(0.8);
    }

    #longMessage {
      display: none;
      margin-top: 20px;
      text-align: left;
      line-height: 1.8;
      background: rgba(255,255,255,0.95);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
    }

    #finalMessage {
      display: none;
      font-size: 30px;
      color: #ff4d6d;
      margin-top: 30px;
      opacity: 0;
      transform: translateY(20px);
    }

    video {
      display: none;
      width: 100%;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    #replayBtn {
      display: none;
      margin-top: 20px;
    }

    /* CINEMATIC DARK MODE */
    .cinema {
      background: black !important;
      color: white;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: float 6s infinite;
    }

    .heart:before, .heart:after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart:before { top: -10px; }
    .heart:after { left: -10px; }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(45deg); opacity: 1; }
      100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
    }
  </style>
</head>

<body>

<div class="card" id="card">

  <h1 id="mainHeading">💖 Mahal😾, ready for a surprise?😸</h1>

  <input id="dateInput" placeholder="Type the date (September 10)">
  <br>
  <button id="submitBtn" onclick="checkDate()">Submit</button>

  <div id="shortMessage"></div>
  <div id="questionBox"></div>

  <video id="loveVideo" loop>
    <source src="rema.mp4" type="video/mp4">
  </video>

  <div id="longMessage"></div>
  <div id="finalMessage"></div>

  <button id="replayBtn" onclick="replayAll()">Replay 💖</button>

</div>

<script>

const fullMessage = `My dearest Rema,

(Replace this with your real message 💕)`;

// floating hearts
setInterval(()=>{
  const heart=document.createElement("div");
  heart.className="heart";
  heart.style.left=Math.random()*100+"vw";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},300);

// typing effect
function typeMessage(text,id,speed=30,callback=null){
  const el=document.getElementById(id);
  el.innerHTML="";
  el.style.display="block";
  let i=0;

  const typing=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(typing);
      if(callback) callback();
    }
  },speed);
}

// check date
function checkDate(){
  const input=document.getElementById("dateInput").value.toLowerCase().trim();

  if(input==="september 10"||input==="september 10, 2025"){

    document.getElementById("mainHeading").style.display="none";
    document.getElementById("dateInput").style.display="none";
    document.getElementById("submitBtn").style.display="none";

    const msg=document.getElementById("shortMessage");
    msg.innerText="Happy Monthsary, bibi ko 😚";
    msg.style.display="block";

    setTimeout(()=>{
      msg.style.transition="1s";
      msg.style.opacity=1;
      msg.style.transform="scale(1.1)";
    },100);

    setTimeout(()=>{msg.style.transform="scale(1)";},1200);

    setTimeout(()=>{
      const q=document.getElementById("questionBox");
      q.innerHTML=`
        <p>Do you want to read my full love message? 💕</p>
        <button onclick="startStory()">Yes 💕</button>
        <button onclick="trickNo()">No 😢</button>
      `;
      q.style.display="block";
    },2500);

  } else {
    alert("Wrong date 😅 try again!");
  }
}

// no button trick
function trickNo(){
  alert("Bawal mo i-no 😏💖");
  startStory();
}

// start story
function startStory(){

  document.getElementById("questionBox").style.display="none";
  document.getElementById("shortMessage").style.display="none";

  // cinematic mode
  document.body.classList.add("cinema");
  document.getElementById("card").style.background="transparent";

  const video=document.getElementById("loveVideo");
  video.style.display="block";
  video.muted=false;
  video.play();

  setTimeout(()=>{
    typeMessage(fullMessage,"longMessage",30,showEnding);
  },2000);
}

// ending
function showEnding(){

  setTimeout(()=>{
    const end=document.getElementById("finalMessage");
    end.innerText="So proud of us, bibi 🤘";
    end.style.display="block";

    setTimeout(()=>{
      end.style.transition="1.5s";
      end.style.opacity=1;
      end.style.transform="translateY(0)";
    },100);

    document.getElementById("replayBtn").style.display="inline-block";

  },1500);
}

// replay
function replayAll(){
  location.reload();
}

</script>

</body>
</html>
