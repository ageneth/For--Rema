<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen ❤️</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap');

        :root {
            --primary-love: #d63384;
            --bg-warm: #fff5f7;
            --accent-gold: #c5a059;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-warm);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #4a4a4a;
        }

        /* Soft Floating Petals */
        .petal {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            pointer-events: none;
            animation: fall 7s linear infinite;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* The Letter Container */
        .letter-card {
            position: relative;
            background: #ffffff;
            width: 90%;
            max-width: 550px;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05), inset 0 0 100px rgba(214, 51, 132, 0.03);
            z-index: 10;
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        /* Decorative Border */
        .letter-card::before {
            content: '';
            position: absolute;
            top: 10px; bottom: 10px; left: 10px; right: 10px;
            border: 1px solid #fce4ec;
            pointer-events: none;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: var(--primary-love);
            margin-bottom: 25px;
        }

        .input-group {
            margin: 20px 0;
        }

        input {
            border: none;
            border-bottom: 2px solid #f8bbd0;
            padding: 10px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            width: 80%;
            background: transparent;
            transition: 0.3s;
        }

        input:focus {
            border-bottom-color: var(--primary-love);
        }

        .btn-love {
            background: var(--primary-love);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.2);
        }

        .btn-love:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(214, 51, 132, 0.3);
        }

        /* Video Styling */
        #vid {
            display: none;
            width: 100%;
            border-radius: 5px;
            margin-top: 20px;
            filter: sepia(20%);
        }

        /* The Message Content */
        #message-box {
            display: none;
            text-align: left;
            line-height: 1.8;
            font-size: 1.05rem;
            max-height: 350px;
            overflow-y: auto;
            margin-top: 20px;
            padding: 10px;
            white-space: pre-wrap;
            color: #555;
            border-top: 1px solid #eee;
        }

        #message-box::-webkit-scrollbar {
            width: 5px;
        }
        #message-box::-webkit-scrollbar-thumb {
            background: #f8bbd0;
            border-radius: 10px;
        }

        .hidden { display: none; }

        .date-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: var(--primary-love);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="letter-card" id="mainCard">
    <div id="step-login">
        <h1>For My Bibi...</h1>
        <p>Before you enter, tell me our special date.</p>
        <div class="input-group">
            <input type="text" id="dateInput" placeholder="September 10">
        </div>
        <button class="btn-love" onclick="checkDate()">Open Letter</button>
    </div>

    <div id="step-transition" class="hidden">
        <h1 class="date-text">Happy 7th Monthsary, Rema ❤️</h1>
        <p>I prepared a little something for you...</p>
        <button class="btn-love" onclick="startLetter()">View My Message</button>
    </div>

    <div id="step-message" class="hidden">
        <video id="vid" loop playsinline>
            <source src="rema.mp4" type="video/mp4">
        </video>
        <div id="message-box"></div>
        <p id="signature" style="text-align: right; font-family: 'Dancing Script', cursive; font-size: 1.5rem; display:none;">
            From your Alang
        </p>
        <button id="replayBtn" class="btn-love hidden" onclick="location.reload()">Read Again 💖</button>
    </div>
</div>

<script>
    const fullMessage = `My bibi remrem,
 
Happy Monthsary, bibi ko😚. pakiss nga, sge na kasi. Iloveyouuu😚. iloveyou ngaa, ayaw mo na talaga sa'kin. Imissyouuuu hehe. bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko? d na kita masyadong naka musta talaga. bibii, mag ingat ikaw palagi dyan po a, palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magpatakbo ka dapat 10 lang d aabot ng 20 haha oa yarn?

Mahal, thank you a. thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas initindi mo ko. sorry po. bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.

Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o HAHAHAHA. kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din HAHAHA tsar. 

Sumakit ba ulo mo habang binabasa mo to mahal?, pagaling ikaw bibi a. wag na magpuyat po. pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. pero bibi, alam ko nmn na miss na miss mo ko dyan at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. kahit saan banda natin tignan, mali talaga pero mali ko din? sorry pooo, iloveyou po.

Mahal, hintayin mo'kong yumaman a. bibilhan kita ng aso, baka. bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi HAHAHAHA ay, joke( bakit ka nmn kasi aayaw kasii? HAHAHAHA)

Mahalllll, wag ikaw mag pakiss sa kung kanino a sa'kin lang dapat yan, akin lang po a. sorry. dapat a? hehe

bibi, ang mahalaga ang importante kaya fighting langg!🤘 
 
ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)`;

    // Floating Petals
    function createPetal() {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.width = Math.random() * 15 + 10 + 'px';
        petal.style.height = petal.style.width;
        petal.style.animationDuration = Math.random() * 3 + 5 + 's';
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 7000);
    }
    setInterval(createPetal, 600);

    function checkDate() {
        const input = document.getElementById('dateInput').value.toLowerCase();
        if(input.includes("september 10") || input.includes("sept 10")) {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#d63384', '#ffb7c5']
            });
            document.getElementById('step-login').classList.add('hidden');
            document.getElementById('step-transition').classList.remove('hidden');
        } else {
            alert("Wrong date, bibi! 😚");
        }
    }

    function startLetter() {
        document.getElementById('step-transition').classList.add('hidden');
        document.getElementById('step-message').classList.remove('hidden');
        
        const vid = document.getElementById('vid');
        vid.style.display = "block";
        vid.play();

        const msgBox = document.getElementById('message-box');
        msgBox.style.display = "block";
        
        let i = 0;
        function typeWriter() {
            if (i < fullMessage.length) {
                msgBox.innerHTML += fullMessage.charAt(i);
                i++;
                msgBox.scrollTop = msgBox.scrollHeight;
                setTimeout(typeWriter, 45); 
            } else {
                document.getElementById('signature').style.display = "block";
                document.getElementById('replayBtn').classList.remove('hidden');
            }
        }
        typeWriter();
    }
</script>

</body>
</html>
