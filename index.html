<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bibi Remrem ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;1,500&family=Quicksand:wght@300;400&display=swap');

        :root {
            --soft-pink: #fce4ec;
            --deep-rose: #d81b60;
            --text-gray: #333333;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #fdfbfb;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- STAGE 1: MINIMALIST ENTRANCE --- */
        #entrance {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 2s ease;
        }

        .entrance-card {
            text-align: center;
            max-width: 320px;
            padding: 20px;
        }

        .entrance-card h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-style: italic;
            color: var(--deep-rose);
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .date-input {
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 12px;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            outline: none;
            font-family: 'Quicksand', sans-serif;
            transition: border-color 0.4s;
            background: transparent;
        }

        .date-input:focus {
            border-bottom-color: var(--deep-rose);
        }

        .btn-open {
            margin-top: 40px;
            background: transparent;
            border: 1px solid var(--deep-rose);
            color: var(--deep-rose);
            padding: 12px 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.5s;
        }

        .btn-open:hover {
            background: var(--deep-rose);
            color: white;
        }

        /* --- STAGE 2: THE CINEMATIC REVEAL --- */
        #video-bg {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: 1;
            display: none;
            filter: brightness(0.4) grayscale(20%);
        }

        .letter-overlay {
            position: relative;
            z-index: 10;
            display: none;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        .formal-letter-block {
            background: white;
            width: 85%;
            max-width: 550px;
            height: 75vh;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            border-radius: 2px;
            animation: fadeInLetter 3s ease;
        }

        @keyframes fadeInLetter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scrollable-content {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 15px;
            scrollbar-width: none;
        }

        .scrollable-content::-webkit-scrollbar { display: none; }

        .letter-body {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            line-height: 1.9;
            color: var(--text-gray);
            white-space: pre-wrap;
            text-align: left;
        }

        .letter-footer {
            margin-top: 30px;
            text-align: right;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            display: none;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--deep-rose);
            margin: 0;
        }

        .heart-icon {
            color: var(--deep-rose);
            font-size: 1.5rem;
            margin-top: 10px;
            cursor: pointer;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

<div id="entrance">
    <div class="entrance-card">
        <h1>For My Rema</h1>
        <input type="text" id="dateInput" class="date-input" placeholder="Our special date...">
        <button class="btn-open" onclick="unlock()">Enter</button>
    </div>
</div>

<video id="video-bg" loop playsinline>
    <source src="rema.mp4" type="video/mp4">
</video>

<div class="letter-overlay" id="letterContainer">
    <div class="formal-letter-block">
        <div class="scrollable-content" id="scrollBox">
            <div class="letter-body" id="textDestination"></div>
            <div class="letter-footer" id="footer">
                <p class="signature">Always yours, Alang</p>
                <div class="heart-icon" onclick="location.reload()">❤</div>
            </div>
        </div>
    </div>
</div>

<script>
    const originalMessage = `My bibi remrem,
 
Happy Monthsary, bibi ko😚. Pakiss nga, sge na kasi. Iloveyouuu😚, iloveyou ngaa. ayaw mo na talaga sa'kin☹️. Imissyouuuu hehe, miss na miss kita palagi. Bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko? d na kita masyadong naka musta talaga. Bibii, mag ingat ikaw palagi dyan po a. Palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magmo-motor ka dapat 10 lang d aabot ng 20 haha, oa yarn?

Mahal, thank you a. Thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas initindi mo ko. Sorry po. Bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.

Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o HAHAHAHA. Kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din HAHAHA tsar. 

Sumakit ba ulo mo habang binabasa mo'to mahal?, pagaling ikaw bibi a wag na magpuyat po. Pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. Pero bibi, alam ko nmn na miss na miss mo ko dyan haha at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. 'Wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. Tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. kahit saan banda natin tignan, mali talaga pero mali ko din? sorry pooo, iloveyou po.

Mahal, hintayin mo'kong yumaman a. Bibilhan kita ng aso, baka.... bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi HAHAHAHA ay, joke( bakit ka nmn kasi aayaw kasii?😾 HAHAHAHA)

Mahalllll, wag ikaw mag pakiss sa kung kanino a(iiyak talaga ako nyan☹️) sa'kin lang dapat yan, akin lang po a. Sorry haha. Dapat a? hehe. MAHAL NA MAHAL KITA PO😭

bibi, ang mahalaga ang importante kaya fighting langg!🤘 SO PROUD OF US!😚🫂
 
ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)`;

    function unlock() {
        const input = document.getElementById('dateInput').value.toLowerCase();
        if(input.includes("september 10") || input.includes("sept 10")) {
            
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#d81b60', '#fce4ec'] });

            document.getElementById('entrance').style.opacity = "0";
            
            setTimeout(() => {
                document.getElementById('entrance').style.display = "none";
                document.getElementById('video-bg').style.display = "block";
                document.getElementById('letterContainer').style.display = "flex";
                
                const vid = document.getElementById('video-bg');
                vid.muted = false;
                vid.play();
                
                typeMessage();
            }, 1500);
        } else {
            alert("Akala mo ngayon no? HAHAHA Unang araw kasi na naging tayo po(naalala  mo pa ba?😚");
        }
    }

    let i = 0;
    function typeMessage() {
        const dest = document.getElementById('textDestination');
        const box = document.getElementById('scrollBox');
        
        if (i < originalMessage.length) {
            dest.innerHTML += originalMessage.charAt(i);
            i++;
            box.scrollTop = box.scrollHeight;
            setTimeout(typeMessage, 45);
        } else {
            document.getElementById('footer').style.display = "block";
            box.scrollTop = box.scrollHeight;
        }
    }
</script>

</body>
</html>
