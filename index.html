<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para kay Rema ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;600&family=Quicksand:wght@400;500&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Quicksand', sans-serif;
        }

        /* Initial Entry Screen */
        #entry-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1.5s ease;
        }

        #vid {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: 1;
            display: none;
            filter: brightness(0.4);
        }

        /* The Formal Block */
        .message-container {
            position: relative;
            z-index: 10;
            display: none;
            width: 85%;
            max-width: 600px;
            margin: 20px auto;
            height: 80vh;
            background: rgba(255, 255, 255, 0.9); /* Pure block look */
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow-y: auto;
            animation: slideUp 2s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #ff4d6d;
            margin-bottom: 20px;
            text-align: center;
        }

        .formal-block-text {
            font-family: 'Playfair Display', serif;
            color: #333;
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap;
            text-align: justify;
        }

        input {
            padding: 12px;
            border-radius: 5px;
            border: 1px solid white;
            width: 250px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .btn-unlock {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        /* Custom Scrollbar for the block */
        .message-container::-webkit-scrollbar { width: 5px; }
        .message-container::-webkit-scrollbar-thumb { background: #ff4d6d; border-radius: 10px; }

        #signature {
            margin-top: 30px;
            text-align: right;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #ff4d6d;
            display: none;
        }

    </style>
</head>
<body>

<div id="entry-screen">
    <h1 style="color: white; font-size: 2rem;">For Rema ❤️</h1>
    <input type="text" id="dateInput" placeholder="Our Special Date">
    <button class="btn-unlock" onclick="unlock()">Unlock</button>
</div>

<video id="vid" loop playsinline>
    <source src="rema.mp4" type="video/mp4">
</video>

<div class="message-container" id="mainBlock">
    <div class="formal-block-text" id="typingTarget"></div>
    <div id="signature">From your Alang</div>
</div>

<script>
    // YOUR ORIGINAL MESSAGE - EXACTLY AS WRITTEN
    const myWords = `My bibi remrem,
 
Happy Monthsary, bibi ko😚. pakiss nga, sge na kasi. Iloveyouuu😚. iloveyou ngaa, ayaw mo na talaga sa'kin. Imissyouuuu hehe. bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko? d na kita masyadong naka musta talaga. bibii, mag ingat ikaw palagi dyan po a, palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magpatakbo ka dapat 10 lang d aabot ng 20 haha oa yarn?

Mahal, thank you a. thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas initindi mo ko. sorry po. bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.

Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o HAHAHAHA. kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din HAHAHA tsar. 

Sumakit ba ulo mo habang binabasa mo to mahal?, pagaling ikaw bibi a. wag na magpuyat po. pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. pero bibi, alam ko nmn na miss na miss mo ko dyan at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. kahit saan banda natin tignan, mali talaga pero mali ko din? sorry pooo, iloveyou po.

Mahal, hintayin mo'kong yumaman a. bibilhan kita ng aso, baka. bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi HAHAHAHA ay, joke( bakit ka nmn kasi aayaw kasii? HAHAHAHA)

Mahalllll, wag ikaw mag pakiss sa kung kanino a sa'kin lang dapat yan, akin lang po a. sorry. dapat a? hehe

bibi, ang mahalaga ang importante kaya fighting langg!🤘 
 
ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)`;

    function unlock() {
        const input = document.getElementById('dateInput').value.toLowerCase();
        
        if(input.includes("september 10") || input.includes("sept 10")) {
            // 1. Confetti celebration
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // 2. Hide entry screen
            document.getElementById('entry-screen').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('entry-screen').style.display = "none";
            }, 1500);

            // 3. Play Video with sound
            const vid = document.getElementById('vid');
            vid.style.display = "block";
            vid.muted = false; // Works because user clicked 'Unlock'
            vid.play();

            // 4. Show the Formal Block and start typing
            setTimeout(() => {
                document.getElementById('mainBlock').style.display = "block";
                startTyping();
            }, 2000);

        } else {
            alert("Wrong date, bibi! 😚");
        }
    }

    let i = 0;
    function startTyping() {
        const target = document.getElementById('typingTarget');
        const container = document.getElementById('mainBlock');

        if (i < myWords.length) {
            target.innerHTML += myWords.charAt(i);
            i++;
            container.scrollTop = container.scrollHeight; // Auto-scrolls the block
            setTimeout(startTyping, 40); 
        } else {
            document.getElementById('signature').style.display = "block";
            container.scrollTop = container.scrollHeight;
        }
    }
</script>

</body>
</html>
