<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para kay Rema ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;600&family=Quicksand:wght@400;500&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- STAGE 1: THE ENTRANCE --- */
        #entry-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 85%;
            max-width: 350px;
        }

        #entry-screen h1 {
            font-family: 'Dancing Script', cursive;
            color: white;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .input-style {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 80%;
            text-align: center;
            font-size: 1rem;
            outline: none;
            margin-top: 15px;
        }

        .btn-unlock {
            margin-top: 20px;
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 85%;
        }

        /* --- STAGE 2: VIDEO & FORMAL BLOCK --- */
        #vid {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: 1;
            display: none;
            filter: brightness(0.4) blur(1px);
        }

        /* The Fixed Formal Block */
        .formal-wrapper {
            position: relative;
            z-index: 10;
            display: none;
            width: 100%;
            height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .formal-block {
            background: rgba(255, 255, 255, 0.98);
            width: 85%;
            max-width: 500px;
            height: 75vh; /* Fixed height to prevent cutting off */
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            animation: slideUp 1.5s ease forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* The Scrollable Text Area */
        .text-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            line-height: 1.7;
            color: #222;
            white-space: pre-wrap;
            text-align: left;
        }

        .text-area::-webkit-scrollbar { width: 3px; }
        .text-area::-webkit-scrollbar-thumb { background: #ff4d6d; }

        #signature {
            margin-top: 20px;
            text-align: right;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #ff4d6d;
            display: none;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

    </style>
</head>
<body>

<div id="entry-screen">
    <div class="login-card">
        <h1>Para sa Bibi ko... ❤️</h1>
        <p style="color: white; font-size: 0.9rem;">Enter our special date</p>
        <input type="text" id="dateInput" class="input-style" placeholder="September 10">
        <button class="btn-unlock" onclick="validate()">Open My Heart 😚</button>
    </div>
</div>

<video id="vid" loop playsinline>
    <source src="rema.mp4" type="video/mp4">
</video>

<div class="formal-wrapper" id="wrapper">
    <div class="formal-block">
        <div class="text-area" id="typewriter"></div>
        <div id="signature">From your Alang ❤️</div>
    </div>
</div>

<script>
    const myWords = `My bibi remrem,
 
Happy Monthsary, bibi ko😚. pakiss nga, sge na kasi. Iloveyouuu😚. iloveyou ngaa, ayaw mo na talaga sa'kin. Imissyouuuu hehe. bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko? d na kita masyadong naka musta talaga. bibii, mag ingat ikaw palagi dyan po a, palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magpatakbo ka dapat 10 lang d aabot ng 20 haha oa yarn?

Mahal, thank you a. thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas initindi mo ko. sorry po. bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.

Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o HAHAHAHA. kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din HAHAHA tsar. 

Sumakit ba ulo mo habang binabasa mo to mahal?, pagaling ikaw bibi a. wag na magpuyat po. pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. pero bibi, alam ko nmn na miss na miss mo ko dyan at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. kahit saan banda natin tignan, mali talaga pero mali ko din? sorry pooo, iloveyou po.

Mahal, hintayin mo'kong yumaman a. bibilhan kita ng aso, baka. bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi HAHAHAHA ay, joke( bakit ka nmn kasi aayaw kasii? HAHAHAHA)

Mahalllll, wag ikaw mag pakiss sa kung kanino a sa'kin lang dapat yan, akin lang po a. sorry. dapat a? hehe

bibi, ang mahalaga ang importante kaya fighting langg!🤘 
 
ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)`;

    function validate() {
        const input = document.getElementById('dateInput').value.toLowerCase();
        
        if(input.includes("september 10") || input.includes("sept 10")) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            document.getElementById('entry-screen').style.opacity = "0";
            document.getElementById('entry-screen').style.transform = "scale(0.8)";
            
            setTimeout(() => {
                document.getElementById('entry-screen').style.display = "none";
                document.getElementById('vid').style.display = "block";
                document.getElementById('wrapper').style.display = "flex";
                
                const vid = document.getElementById('vid');
                vid.muted = false;
                vid.play();
                
                typeEffect();
            }, 1000);
        } else {
            alert("Wrong date, bibi! 😚");
        }
    }

    let charIndex = 0;
    function typeEffect() {
        const target = document.getElementById('typewriter');
        const textArea = document.querySelector('.text-area');

        if (charIndex < myWords.length) {
            target.innerHTML += myWords.charAt(charIndex);
            charIndex++;
            textArea.scrollTop = textArea.scrollHeight;
            setTimeout(typeEffect, 40); 
        } else {
            document.getElementById('signature').style.display = "block";
            textArea.scrollTop = textArea.scrollHeight;
        }
    }
</script>

</body>
</html>
