<!DOCTYPE html>
<html>
<head>
  <title>For Rema ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      overflow: hidden;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 45px;
      color: #ff4d6d;
      text-shadow: 0 0 20px #ff4d6d;
    }

    input {
      padding: 15px;
      width: 80%;
      max-width: 400px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
    }

    button {
      margin-top: 15px;
      padding: 14px 30px;
      font-size: 18px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    /* INTRO */
    #intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      animation: fadeOut 3s forwards;
    }

    @keyframes fadeOut {
      0% {opacity:1;}
      100% {opacity:0; visibility:hidden;}
    }

    /* BOOM TEXT */
    #boom {
      display: none;
      font-size: 50px;
      color: #ff4d6d;
      animation: pop 1s ease;
      text-shadow: 0 0 20px pink;
    }

    @keyframes pop {
      0% {transform: scale(0.5); opacity:0;}
      100% {transform: scale(1); opacity:1;}
    }

    /* HEARTBEAT */
    @keyframes beat {
      0%,100% {transform: scale(1);}
      50% {transform: scale(1.1);}
    }

    #boom span {
      display: inline-block;
      animation: beat 1s infinite;
    }

    #question {
      display: none;
    }

    video {
      display: none;
      width: 90%;
      max-width: 700px;
      border-radius: 20px;
      margin-top: 20px;
    }

    #message {
      display: none;
      max-width: 700px;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
      text-align: left;
    }

    #ending {
      display: none;
      font-size: 30px;
      color: #ff4d6d;
      margin-top: 20px;
      text-shadow: 0 0 15px pink;
    }

    #popup {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      display: none;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div id="intro">💖 Our Story Begins... 💖</div>

<div class="center">

  <h1 id="title">Mahal😾 ready for a surprise? 😸</h1>

  <input id="date" placeholder="Type the date HAHAHA">
  <button onclick="checkDate()">Submit</button>

  <div id="boom">
    💖 <span>HAPPY MONTHSARY, BIBI KO 😚</span> 💖
  </div>

  <button id="nextBtn" onclick="showQuestion()" style="display:none;">Next 💕</button>

  <div id="question"></div>

  <video id="vid" loop>
    <source src="rema.mp4" type="video/mp4">
  </video>

  <div id="message"></div>
  <div id="ending"></div>

  <button onclick="location.reload()" id="replay" style="display:none;">Replay 💖</button>

</div>

<div id="popup"></div>

<script>

const text = `‎My bibi remrem,
‎ 
‎Happy Monthsary, bibi ko😚. pakiss nga, sge na kasi. Iloveyouuu😚. iloveyou ngaa, ayaw mo na talaga sa'kin. Imissyouuuu hehe. bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko? d na kita masyadong naka musta talaga. bibii, mag ingat ikaw palagi dyan po a, palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magpatakbo ka dapat 10 lang d aabot ng 20 haha oa yarn?
‎
‎Mahal, thank you a. thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas  initindi mo ko. sorry po. bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.
‎
‎Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o HAHAHAHA. kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din HAHAHA tsar. 
‎
‎Sumakit ba ulo mo habang binabasa mo to mahal?, pagaling ikaw bibi a. wag na magpuyat po. pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. pero bibi, alam ko nmn na miss na miss mo ko dyan at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. kahit saan banda natin tignan, mali talaga pero mali ko din? sorry pooo, iloveyou po.
‎
‎Mahal, hintayin mo'kong  yumaman a. bibilhan kita ng aso, baka. bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi HAHAHAHA ay, joke( bakit ka nmn kasi aayaw kasii? HAHAHAHA)
‎
‎Mahalllll, wag ikaw mag pakiss sa kung kanino a sa'kin lang dapat yan, akin lang po a. sorry. dapat a? hehe
‎
‎bibi, ang mahalaga ang importante kaya fighting langg!🤘 
‎ 
‎ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)
‎
‎
‎From your Alang (nalang kasi pangit ng pangalan ko)`;

// popup
function pop(msg){
  const p=document.getElementById("popup");
  p.innerText=msg;
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2000);
}

// check date
function checkDate(){
  let d=document.getElementById("date").value.toLowerCase();

  if(d==="september 10"||d==="september 10, 2025"){

    document.getElementById("title").style.display="none";
    document.getElementById("date").style.display="none";

    document.getElementById("boom").style.display="block";
    document.getElementById("nextBtn").style.display="block";

  } else {
    pop("HAHAHA mali 😭 isipin mo mabuti!");
  }
}

// question
function showQuestion(){
  document.getElementById("boom").style.display="none";
  document.getElementById("nextBtn").style.display="none";

  let q=document.getElementById("question");
  q.innerHTML=`
    <p>Read my message? 💕</p>
    <button onclick="start()">Yes 💖</button>
    <button onclick="no()">No 😢</button>
  `;
  q.style.display="block";
}

// no trap 😭
function no(){
  pop("No?? sure ka? 😏");

  let q=document.getElementById("question");
  q.innerHTML=`
    <p>Last chance 😭</p>
    <button onclick="start()">Yes 💖</button>
    <button onclick="start()">Yes 💖</button>
  `;
}

// start story
function start(){
  document.getElementById("question").style.display="none";

  let v=document.getElementById("vid");
  v.style.display="block";
  v.play();

  setTimeout(()=>{
    let m=document.getElementById("message");
    m.style.display="block";
    m.innerText=text;

    setTimeout(()=>{
      let e=document.getElementById("ending");
      e.innerText="So proud of us, bibi 🤘";
      e.style.display="block";

      document.getElementById("replay").style.display="block";

    },3000);

  },2000);
}

</script>

</body>
</html>
