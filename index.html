<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para kay Rema ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        :root {
            --deep-rose: #d81b60;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
        }

        /* --- STAGE 1: ENTRANCE --- */
        #entrance {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease;
        }

        .entrance-card {
            text-align: center;
            width: 80%;
            max-width: 320px;
        }

        .entrance-card h1 {
            font-family: 'Playfair Display', serif;
            color: var(--deep-rose);
            font-size: 2.2rem;
            margin-bottom: 30px;
        }

        .date-input {
            border: none;
            border-bottom: 2px solid #eee;
            padding: 12px;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .date-input:focus {
            border-bottom-color: var(--deep-rose);
        }

        .btn-open {
            margin-top: 40px;
            background: var(--deep-rose);
            color: white;
            border: none;
            padding: 12px 50px;
            border-radius: 30px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(216, 27, 96, 0.2);
        }

        /* --- STAGE 2: THE VIDEO & FROSTED LETTER --- */
        #video-bg {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: 1;
            display: none;
            filter: brightness(0.7); /* Slightly dimmed to help text readability */
        }

        .letter-overlay {
            position: relative;
            z-index: 10;
            display: none;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        .frosted-letter {
            background: rgba(255, 255, 255, 0.15); /* Semi-transparent */
            backdrop-filter: blur(15px); /* The "Frosted" look */
            -webkit-backdrop-filter: blur(15px);
            width: 85%;
            max-width: 500px;
            height: 70vh;
            padding: 35px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 1.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: none;
        }

        .scroll-area::-webkit-scrollbar { display: none; }

        .letter-text {
            color: white;
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            white-space: pre-wrap;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3); /* Makes text pop on video */
        }

        .letter-footer {
            margin-top: 25px;
            text-align: right;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
            display: none;
        }

        .sig {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: white;
            margin: 0;
        }

        .heart {
            color: #ff4081;
            font-size: 1.8rem;
            margin-top: 10px;
            cursor: pointer;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

<div id="entrance">
    <div class="entrance-card">
        <h1>For My Bibi Remrem</h1>
        <input type="text" id="dateInput" class="date-input" placeholder="Our special date...">
        <button class="btn-open" onclick="unlock()">Enter</button>
    </div>
</div>

<video id="video-bg" loop playsinline>
    <source src="rema.mp4" type="video/mp4">
</video>

<div class="letter-overlay" id="letterContainer">
    <div class="frosted-letter">
        <div class="scroll-area" id="scrollBox">
            <div class="letter-text" id="textTarget"></div>
            <div class="letter-footer" id="footer">
                <p class="sig">Always yours, Alang</p>
                <div class="heart" onclick="location.reload()">❤</div>
            </div>
        </div>
    </div>
</div>

<script>
    const originalMessage = `My bibi remrem,
 
Happy Monthsary, bibi ko😚. pakiss nga, sge na kasi. Iloveyouuu😚. iloveyou ngaa, ayaw mo na talaga sa'kin. Imissyouuuu hehe. bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko? d na kita masyadong naka musta talaga. bibii, mag ingat ikaw palagi dyan po a, palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magmomotor ka dapat 10 lang d aabot ng 20 haha oa yarn?

Mahal, thank you a. thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas initindi mo ko. sorry po. bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.

Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o HAHAHAHA. kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din HAHAHA tsar. 

Sumakit ba ulo mo habang binabasa mo to mahal?, pagaling ikaw bibi a. wag na magpuyat po. pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. pero bibi, alam ko nmn na miss na miss mo ko dyan at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. kahit saan banda natin tignan, mali talaga pero mali ko din? sorry pooo, iloveyou po.

Mahal, hintayin mo'kong yumaman a. bibilhan kita ng aso, baka. bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi HAHAHAHA ay, joke( bakit ka nmn kasi aayaw kasii? HAHAHAHA)

Mahalllll, wag ikaw mag pakiss sa kung kanino a sa'kin lang dapat yan, akin lang po a. sorry. dapat a? hehe. MAHAL NA MAHAL KITA PO😭

bibi, ang mahalaga ang importante kaya fighting langg!🤘 SO PROUD OF US!😚🫂
 
ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)`;

    function unlock() {
        const input = document.getElementById('dateInput').value.toLowerCase();
        if(input.includes("september 10") || input.includes("sept 10")) {
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d81b60', '#ffffff'] });

            document.getElementById('entrance').style.opacity = "0";
            
            setTimeout(() => {
                document.getElementById('entrance').style.display = "none";
                document.getElementById('video-bg').style.display = "block";
                document.getElementById('letterContainer').style.display = "flex";
                
                const vid = document.getElementById('video-bg');
                vid.muted = false;
                vid.play();
                
                typeMessage();
            }, 1000);
        } else {
            alert("Maling date, bibi! Yung naging tayo a? Hehe 😚");
        }
    }

    let i = 0;
    function typeMessage() {
        const dest = document.getElementById('textTarget');
        const box = document.getElementById('scrollBox');
        
        if (i < originalMessage.length) {
            dest.innerHTML += originalMessage.charAt(i);
            i++;
            box.scrollTop = box.scrollHeight;
            setTimeout(typeMessage, 45);
        } else {
            document.getElementById('footer').style.display = "block";
            box.scrollTop = box.scrollHeight;
        }
    }
</script>

</body>
</html>
