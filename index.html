<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para kay Rema ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Quicksand', sans-serif;
            color: white;
        }

        /* Initial Pink Background */
        #bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            z-index: 1;
            transition: opacity 2s ease;
        }

        /* Video as a cinematic background */
        #vid {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: 0;
            display: none;
            filter: brightness(0.6) blur(2px);
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #ff4d6d;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        input {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 15px;
            border-radius: 50px;
            width: 250px;
            text-align: center;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-start {
            margin-top: 20px;
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        /* Message Display */
        #message-wrap {
            display: none;
            width: 90%;
            max-width: 600px;
            max-height: 70vh;
            overflow-y: auto;
            text-align: left;
            line-height: 1.8;
            font-size: 1.1rem;
            padding-right: 10px;
            scrollbar-width: none; /* Firefox */
        }

        #message-wrap::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .typing-text {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-weight: 400;
        }

        /* Final Heart Overlay */
        #final-touch {
            display: none;
            margin-top: 30px;
            animation: fadeIn 3s ease;
        }

        .heart-btn {
            font-size: 3rem;
            cursor: pointer;
            filter: drop-shadow(0 0 10px #ff4d6d);
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="bg-overlay"></div>

<video id="vid" loop playsinline muted>
    <source src="rema.mp4" type="video/mp4">
</video>

<div class="container">
    <div id="step-1">
        <h1>Para sa mahal ko...</h1>
        <input type="text" id="date" placeholder="Anong date tayo nag simula?">
        <br>
        <button class="btn-start" onclick="checkDate()">Enter ❤️</button>
    </div>

    <div id="message-wrap">
        <div class="typing-text" id="text-target"></div>
        <div id="final-touch">
            <p style="font-family: 'Dancing Script'; font-size: 2rem; color: #ff8fa3;">Mahal na mahal kita, palagi. ❤️</p>
            <div class="heart-btn" onclick="location.reload()">❤️</div>
        </div>
    </div>
</div>

<script>
    const text = `My bibi remrem,
 
Happy Monthsary, bibi ko😚. pakiss nga, sge na kasi. Iloveyouuu😚. iloveyou ngaa, ayaw mo na talaga sa'kin. Imissyouuuu hehe. bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko? d na kita masyadong naka musta talaga. bibii, mag ingat ikaw palagi dyan po a, palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magpatakbo ka dapat 10 lang d aabot ng 20 haha oa yarn?

Mahal, thank you a. thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas initindi mo ko. sorry po. bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.

Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o HAHAHAHA. kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din HAHAHA tsar. 

Sumakit ba ulo mo habang binabasa mo to mahal?, pagaling ikaw bibi a. wag na magpuyat po. pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. pero bibi, alam ko nmn na miss na miss mo ko dyan at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. kahit saan banda natin tignan, mali talaga pero mali ko din? sorry pooo, iloveyou po.

Mahal, hintayin mo'kong yumaman a. bibilhan kita ng aso, baka. bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi HAHAHAHA ay, joke( bakit ka nmn kasi aayaw kasii? HAHAHAHA)

Mahalllll, wag ikaw mag pakiss sa kung kanino a sa'kin lang dapat yan, akin lang po a. sorry. dapat a? hehe

bibi, ang mahalaga ang importante kaya fighting langg!🤘 
 
ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)

- Alang`;

    function checkDate() {
        let d = document.getElementById("date").value.toLowerCase();
        if(d.includes("september 10") || d.includes("sept 10")) {
            startCelebration();
        } else {
            alert("Bibi naman e, try again! 😚");
        }
    }

    function startCelebration() {
        // Confetti
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

        // Transitions
        document.getElementById("step-1").style.display = "none";
        document.getElementById("bg-overlay").style.opacity = "0";
        
        const vid = document.getElementById("vid");
        vid.style.display = "block";
        vid.unmuted = false; // Try to play with sound if browser allows
        vid.play();

        setTimeout(() => {
            document.getElementById("message-wrap").style.display = "block";
            typeWriter();
        }, 2000);
    }

    let i = 0;
    function typeWriter() {
        const target = document.getElementById("text-target");
        const wrap = document.getElementById("message-wrap");
        
        if (i < text.length) {
            target.innerHTML += text.charAt(i);
            i++;
            wrap.scrollTop = wrap.scrollHeight;
            setTimeout(typeWriter, 50);
        } else {
            document.getElementById("final-touch").style.display = "block";
            wrap.scrollTop = wrap.scrollHeight;
        }
    }
</script>

</body>
</html>
