<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  overflow: hidden;
}

/* VIDEO BACKGROUND */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* PETALS */
.petal {
  position: fixed;
  top: -10px;
  width: 15px;
  height: 15px;
  background: radial-gradient(circle, #ffb6c1, #ff4d6d);
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  opacity: 0.7;
  animation: fall linear forwards;
  z-index: 2;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(45deg); opacity: 0.8; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* INPUT BOX */
#dateContainer {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 40px 20px;
  border-radius: 20px;
  text-align: center;
}

#dateInput {
  width: 80%;
  padding: 15px;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 15px;
}

button {
  margin-top: 15px;
  padding: 14px 30px;
  font-size: 18px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #e60039;
}

/* SCROLLABLE LETTER */
#letter {
  display: none;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  height: 100vh;
  overflow-y: auto;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(5px);
  padding: 40px;
  border-radius: 20px;
  text-align: left;
  line-height: 1.8;
  font-size: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* POPUP ALERT */
#popup {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #ff4d6d;
  color: white;
  padding: 20px 30px;
  border-radius: 15px;
  display: none;
  font-size: 20px;
  font-weight: bold;
  z-index: 10;
}
</style>
</head>

// POPUP ALERT
function showPopup(msg){

// CHECK DATE

// SHOW LETTER
