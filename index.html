<!DOCTYPE html>
<html>
<head>
  <title>For Rema ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
    }

    .card {
      position: relative;
      z-index: 2;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 500px;
      margin: 80px auto;
      text-align: center;
    }

    h1 {
      color: #ff4d6d;
      font-size: 28px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
      margin-bottom: 10px;
      width: 70%;
    }

    button {
      background: #ff4d6d;
      border: none;
      padding: 12px 20px;
      color: white;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #e60039;
    }

    #longMessage {
      margin-top: 20px;
      text-align: left;
      line-height: 1.6;
      white-space: pre-line;
      display: none;
      font-size: 16px;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: float 6s infinite;
    }

    .heart:before,
    .heart:after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart:before { top: -10px; left: 0; }
    .heart:after { left: -10px; top: 0; }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(45deg); opacity: 1; }
      100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="card">
  <h1>💖 Hey love, ready for a surprise? 💖</h1>
  <p>Type our special monthsary date to unlock your message!</p>
  <input type="text" id="dateInput" placeholder="Type the date (e.g., April 10)">
  <br><br>
  <button onclick="checkDate()">Submit</button>

  <div id="musicBox"></div>

  <div id="longMessage"></div>
</div>

<script>
const fullMessage = `My dearest Rema,

Happy monthsary, my love 😘💖. Every day with you feels brighter and sweeter. I love the way you laugh, the way you care, and how you make my heart feel safe. You’re my favorite person, my best friend, and my home all at once.

Thank you for loving me just as I am, for being patient with my quirks, and for holding my heart so gently. I promise to cherish you, support you, and make you feel as loved as you make me feel every single day.

Here’s to many more months and years together, my bibi 💕. I love you endlessly.

— Yours, forever and always 💌`;

function typeMessage(message, elementId, delay = 40) {
  const element = document.getElementById(elementId);
  let index = 0;
  element.style.display = 'block';
  element.textContent = '';

  const typing = setInterval(() => {
    element.textContent += message[index];
    index++;
    if (index >= message.length) clearInterval(typing);
  }, delay);
}

function checkDate() {
  const input = document.getElementById("dateInput").value.trim().toLowerCase();
  if (input === "april 10") {
    alert("Yay! Happy monthsary, my love 😚💖 You’ve unlocked your special surprise!");

    // Play music using iframe
    const musicBox = document.getElementById("musicBox");
    musicBox.innerHTML = `<iframe width="0" height="0"
      src="https://www.youtube.com/embed/TpOCHCNNtRU?autoplay=1&loop=1&playlist=TpOCHCNNtRU&controls=0"
      frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
    </iframe>`;

    // Type out the long message
    typeMessage(fullMessage, 'longMessage', 30);
  } else {
    alert("Hmm… that’s not quite right 😅. Try again!");
  }
}

// Floating hearts animation
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
