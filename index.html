<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Bibi 💗</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  color: #333;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* BLUR OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(6px);
  z-index: -1;
}

/* CENTER BOX */
.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* INPUT BOX */
input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* BUTTON */
button {
  padding: 12px 20px;
  border: none;
  background: #ff4d88;
  color: white;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}

/* MESSAGE BOX */
.message {
  display: none;
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.box {
  background: #ffffff;
  border-radius: 20px;
  padding: 25px;
  height: 80vh;
  overflow-y: auto;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* TEXT */
p {
  font-size: 18px;
  line-height: 1.6;
}

/* HEARTS */
.heart, .petal {
  position: fixed;
  bottom: -10px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="bgVideo" loop muted playsinline>
  <source src="rema.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- LOGIN -->
<div class="center" id="login">
  <div>
    <h2>Enter our monthsary date 😚</h2>
    <p>(hint: April 10)</p>
    <input type="text" id="dateInput" placeholder="type here...">
    <br>
    <button onclick="checkDate()">Enter 💗</button>
  </div>
</div>

<!-- MESSAGE -->
<div class="message" id="main">
  <h1 style="text-align:center; color:#ff4d88;">Happy Monthsary, Bibi 💗</h1>

  <div class="box">
    <p id="typing"></p>
  </div>
</div>

<script>
const text = `My bibi remrem,

Happy Monthsary, bibi ko 😚 pakiss nga, sige na kasi. I love youuu 😚 iloveyou ngaa. Miss na miss kita hehe. Bibii, hiii haha, anong oras mo na kaya ‘to mababasa? Kamusta ka, bibi ko? Hindi na kita masyadong nakakamusta talaga.

Bibii, mag-ingat ka palagi dyan ha. Kung magpapatakbo ka, 10 lang ha bawal 20 HAHAHA.

Mahal, thank you kasi palagi mo akong iniintindi. Sorry po kung minsan nakakalimutan ko din nararamdaman mo. Valid feelings mo ha.

7 months na tayo… ang galing natin 😭💗 kahit minsan nagtatampo tayo, nandito pa rin tayo.

Bibi, wag ka na magpuyat ha. Mas importante tulog mo, mahal.

Mahal, hintayin mo ‘kong yumaman ha HAHAHA.

Wag ka magpapakiss sa iba ha 😚 sakin lang yan hehe.

Ang mahalaga ang importante, kaya fighting langgg! 🤘
So proud of us, bibiiii 💗

I LOVE YOU SO MUCH, BIBI KO 💗

—From your Alang 💗`;

let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}

function checkDate() {
  let input = document.getElementById("dateInput").value.toLowerCase();

  if (input.includes("april 10")) {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";

    let vid = document.getElementById("bgVideo");
    vid.muted = false;
    vid.play();

    typeWriter();
    setInterval(createHeart, 300);
    setInterval(createPetal, 500);

  } else {
    alert("Mali ang date mo, mahal 😚 try again!");
  }
}

/* HEARTS */
function createHeart() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}

/* PETALS */
function createPetal() {
  let petal = document.createElement("div");
  petal.className = "petal";
  petal.innerHTML = "🌸";
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.fontSize = (Math.random() * 20 + 15) + "px";
  petal.style.animationDuration = (Math.random() * 4 + 4) + "s";

  document.body.appendChild(petal);

  setTimeout(() => petal.remove(), 6000);
}
</script>

</body>
</html>
