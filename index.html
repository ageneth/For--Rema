<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rema ❤️</title>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #ffdde1;
            --deep-rose: #ee9ca7;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--soft-pink), var(--deep-rose));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: #333;
        }

        /* Floating Hearts Background Animation */
        .heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.3);
            font-size: 20px;
            pointer-events: none;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary-pink);
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid transparent;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        input:focus {
            border-color: var(--primary-pink);
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            background: var(--primary-pink);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        button:hover {
            background: #ff3355;
            transform: scale(1.05);
        }

        #boom {
            display: none;
            font-size: 2.5rem;
            color: var(--primary-pink);
            margin-bottom: 20px;
        }

        .fade-in {
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        video {
            display: none;
            width: 100%;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        #message {
            display: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 25px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: left;
            line-height: 1.6;
            font-size: 1.1rem;
            max-height: 300px;
            overflow-y: auto;
        }

        #ending {
            margin-top: 20px;
            font-weight: bold;
            color: var(--primary-pink);
            font-size: 1.2rem;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .container { padding: 25px; }
        }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <h1 id="title">💖 Mahal, ready for a surprise? 💖</h1>
    
    <div id="loginStep">
        <input type="text" id="date" placeholder="Our special date (e.g. Sept 10)">
        <br>
        <button onclick="checkDate()">Unlock ❤️</button>
    </div>

    <div id="boom" class="fade-in">Happy Monthsary, bibi ko 😚</div>
    <button id="nextBtn" onclick="showQuestion()" style="display:none;">Next 💕</button>

    <div id="question" style="display:none;" class="fade-in">
        <p>Do you want to read my message? 💕</p>
        <button onclick="start()">Yes 💖</button>
        <button onclick="noTrapping()">No 😢</button>
    </div>

    <video id="vid" loop playsinline>
        <source src="rema.mp4" type="video/mp4">
    </video>

    <div id="message" class="fade-in"></div>
    <div id="ending" class="fade-in"></div>

    <button id="replay" onclick="location.reload()" style="display:none;">Replay 💖</button>
</div>

<script>
    // 1. YOUR MESSAGE
    const longMessage = ` Mahal, Happy Monthsary! Every day with you is a blessing. 
    I'm so lucky to have you as my partner. Thank you for the love, the patience, 
    and all the memories we've shared so far. Here's to many more! 🤘💕`;

    // 2. BACKGROUND HEARTS
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 3 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 500);

    // 3. DATE CHECK
    function checkDate() {
        let d = document.getElementById("date").value.toLowerCase().trim();
        // Checks for variations of the date
        if (d.includes("september 10") || d.includes("sept 10") || d === "09/10/25") {
            document.getElementById("loginStep").style.display = "none";
            document.getElementById("title").style.display = "none";
            document.getElementById("boom").style.display = "block";
            document.getElementById("nextBtn").style.display = "inline-block";
        } else {
            alert("Wrong date, bibi! Try again. 😚");
        }
    }

    // 4. QUESTION
    function showQuestion() {
        document.getElementById("boom").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("question").style.display = "block";
    }

    function noTrapping() {
        alert("No? Sure ka ba? 😏");
        let q = document.getElementById("question");
        q.innerHTML = `
            <p>Last chance... say yes na! 😭</p>
            <button onclick="start()">Yes 💖</button>
            <button onclick="start()">Yes (Syempre) 💖</button>
        `;
    }

    // 5. START REVELATION (Typewriter Effect)
    function start() {
        document.getElementById("question").style.display = "none";
        const v = document.getElementById("vid");
        v.style.display = "block";
        v.play();

        const msgDiv = document.getElementById("message");
        msgDiv.style.display = "block";
        
        // Typewriter logic
        let i = 0;
        function typeWriter() {
            if (i < longMessage.length) {
                msgDiv.innerHTML += longMessage.charAt(i);
                i++;
                msgDiv.scrollTop = msgDiv.scrollHeight; // Auto-scroll
                setTimeout(typeWriter, 50); 
            } else {
                showEnding();
            }
        }
        typeWriter();
    }

    function showEnding() {
        const e = document.getElementById("ending");
        e.innerText = "So proud of us, bibi 🤘";
        document.getElementById("replay").style.display = "inline-block";
    }
</script>

</body>
</html>
