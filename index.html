<!DOCTYPE html>
<html>
<head>
<title>For Rema ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* MAIN */
.container {
  text-align: center;
  max-width: 700px;
  width: 90%;
}

/* TITLE */
h1 {
  font-size: 36px;
  color: #ff4d6d;
}

/* INPUT */
input {
  width: 80%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  text-align: center;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}
button:hover {
  background: #ff7993;
}

/* BOOM */
#boom {
  display: none;
  font-size: 42px;
  color: #ff4d6d;
  font-weight: bold;
  animation: fadeIn 1.5s ease;
}

/* FADE */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* QUESTION */
#question {
  display: none;
  margin-top: 20px;
}

/* VIDEO */
video {
  display: none;
  width: 100%;
  border-radius: 20px;
  margin-top: 20px;
}

/* LETTER */
#message {
  display: none;
  background: linear-gradient(145deg, #ffe0e6, #ffd1da);
  padding: 30px;
  border-radius: 20px;
  margin-top: 20px;
  text-align: left;
  line-height: 1.8;
  max-height: 80vh;
  overflow-y: auto; 
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  font-size: 18px;
  border: 2px solid #ff4d6d;
  animation: glow 3s ease-in-out infinite alternate;
}

/* Glow animation */
@keyframes glow {
  0% { box-shadow: 0 10px 25px rgba(255, 77, 109, 0.3); }
  100% { box-shadow: 0 10px 35px rgba(255, 77, 109, 0.7); }
}

/* FANCY SCROLLBAR */
#message::-webkit-scrollbar {
  width: 12px;
}
#message::-webkit-scrollbar-track {
  background: #ffd1da;
  border-radius: 10px;
}
#message::-webkit-scrollbar-thumb {
  background: linear-gradient(#ff4d6d, #ff7993);
  border-radius: 10px;
}
#message::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(#ff7993, #ff4d6d);
}

/* BUTTON COLORS */
button.yes, button.no {
  background: #ff4d6d;
  color: white;
  margin: 5px;
}
button.yes:hover, button.no:hover {
  background: #ff7993;
}

/* 🌸 PETALS */
.petal {
  position: fixed;
  top: -10px;
  width: 15px;
  height: 15px;
  background: radial-gradient(circle, #ffb6c1, #ff4d6d);
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  opacity: 0.7;
  animation: fall linear forwards;
}
@keyframes fall {
  0% { transform: translateY(0) rotate(45deg); opacity: 0.8; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* MESSAGE COLORS */
.highlight { color: #ff4d6d; font-weight: bold; }
.pink { color: #ff69b4; }
.purple { color: #9b59b6; }
.blue { color: #3498db; }
.green { color: #2ecc71; }
.orange { color: #e67e22; }

</style>
</head>
<body>

<div class="container">

<h1 id="title">💖 Mahal, ready for a surprise? 💖</h1>

<input id="date" placeholder="Type our special date">
<br>
<button id="submitBtn" onclick="checkDate()">Submit 💖</button>

<div id="boom">Happy Monthsary, bibi ko 😚</div>
<div id="question"></div>

<video id="vid" loop>
<source src="rema.mp4" type="video/mp4">
</video>

<div id="message"></div>

</div>

<script>
// Full message
const text = `
<span class="highlight">My bibi remrem,</span><br><br>
<span class="pink">Happy Monthsary, bibi ko 😚. Pakiss nga, sge na kasi. I love youuu 😚.</span><br>
Iloveyou ngaa, ayaw mo na talaga sa'kin. Imissyouuuu hehe.<br>
Bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko?<br>
D na kita masyadong naka musta talaga. Bibii, mag ingat ikaw palagi dyan po a, palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magpatakbo ka dapat 10 lang d aabot ng 20 haha oa yarn?<br><br>

Mahal, thank you a. Thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas initindi mo ko. Sorry po. Bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.<br><br>

Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o <span class="orange">HAHAHAHA</span>. Kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din <span class="orange">HAHAHA tsar</span>.<br><br>

Sumakit ba ulo mo habang binabasa mo to mahal? Pagaling ikaw bibi a. Wag na magpuyat po. Pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. Pero bibi, alam ko nmn na miss na miss mo ko dyan at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. Wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. Tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. Kahit saan banda natin tignan, mali talaga pero mali ko din? Sorry pooo, iloveyou po.<br><br>

Mahal, hintayin mo'kong yumaman a. Bibilhan kita ng aso, baka. Bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi <span class="orange">HAHAHAHA</span> ay, joke (bakit ka nmn kasi aayaw kasii? <span class="orange">HAHAHAHA</span>)<br><br>

Mahalllll, wag ikaw mag pakiss sa kung kanino a sa'kin lang dapat yan, akin lang po a. Sorry. Dapat a? hehe<br><br>

Bibi, ang importante kaya <span class="green">fighting langg! 🤘</span><br><br>

<span class="highlight">ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)</span><br><br>

<span class="purple">From your Alang (nalang kasi pangit ng pangalan ko)</span>
`;

// 🌸 PETALS
setInterval(()=>{
  const petal = document.createElement("div");
  petal.className = "petal";
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(petal);
  setTimeout(()=>petal.remove(),10000);
},500);

// check date
function checkDate(){
  let d = document.getElementById("date").value.toLowerCase();
  if(d==="september 10"||d==="september 10, 2025"){
    document.getElementById("title").style.display="none";
    document.getElementById("date").style.display="none";
    document.getElementById("submitBtn").style.display="none";
    document.getElementById("boom").style.display="block";
    setTimeout(showQuestion,5000);
  } else {
    alert("Oops 😏 mali ang date! Try again.");
  }
}

// question
function showQuestion(){
  document.getElementById("boom").style.display="none";
  let q=document.getElementById("question");
  q.innerHTML=`
    <p>Do you want to read my message? 💕</p>
    <button class="yes" onclick="start()">Yes 💖</button>
    <button class="no" onclick="noClick()">No 😢</button>
  `;
  q.style.display="block";
}

// no click
function noClick(){
  alert("No?? 😏 Are you sure?");
  let q=document.getElementById("question");
  q.innerHTML=`
    <p>Last chance 😭</p>
    <button class="yes" onclick="start()">Yes 💖</button>
    <button class="yes" onclick="start()">Yes 💖</button>
  `;
}

// start
function start(){
  document.getElementById("question").style.display="none";
  let v=document.getElementById("vid");
  v.style.display="block";
  v.play();

  setTimeout(()=>{
    let m=document.getElementById("message");
    m.style.display="block";
    m.innerHTML = text;

    // Slow auto-scroll
    let scrollSpeed = 1;
    let scrollInterval = setInterval(()=>{
      if(m.scrollTop + m.clientHeight < m.scrollHeight){
        m.scrollTop += scrollSpeed;
      } else {
        clearInterval(scrollInterval);
      }
    },50);

    // Manual scroll allowed
    m.addEventListener('scroll', ()=>{});
  },2000);
}

</script>

</body>
</html>
