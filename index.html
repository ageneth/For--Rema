<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para kay Rema ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;600&family=Quicksand:wght@400;500&display=swap');

        :root {
            --primary-love: #ff4d6d;
            --soft-pink: #fce4ec;
            --text-dark: #222;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- STAGE 1: ENTRANCE (PRESERVED ELEGANCE) --- */
        #entry-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 85%;
            max-width: 350px;
        }

        #entry-screen h1 {
            font-family: 'Dancing Script', cursive;
            color: white;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .input-style {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 80%;
            text-align: center;
            font-size: 1rem;
            outline: none;
            margin-top: 15px;
            font-family: 'Quicksand', sans-serif;
        }

        .btn-unlock {
            margin-top: 20px;
            background: var(--primary-love);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 85%;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- STAGE 2: FORMAL LETTER BLOCK --- */
        #background-static {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--soft-pink);
            z-index: 1;
            display: none;
        }

        .formal-wrapper {
            position: relative;
            z-index: 10;
            display: none;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .formal-block {
            background: #ffffff; /* Reverted to solid white for formal look */
            width: 85%;
            max-width: 500px;
            height: 80vh; /* Fixed height is key */
            padding: 20px 0; /* Vertical padding only, let internal scroll pad sides */
            border-radius: 2px; /* Classic paper edge */
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            animation: slideUp 1.5s ease forwards;
            overflow: hidden; /* Important for the internal scroll */
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- MEDIA AREA AT TOP (THE LYRICS FIX) --- */
        .media-area {
            width: 90%;
            margin: 0 auto;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            background-color: white;
        }

        #vid {
            width: 100%;
            border-radius: 2px;
            display: none;
            /* Filter removed so lyrics are clear */
        }

        /* --- THE SCROLLABLE TEXT AREA --- */
        .text-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px 40px;
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-dark);
            white-space: pre-wrap;
            text-align: left;
        }

        .text-area::-webkit-scrollbar { width: 4px; }
        .text-area::-webkit-scrollbar-thumb { background: var(--primary-love); border-radius: 10px; }

        #signature {
            margin-top: 20px;
            text-align: right;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: var(--primary-love);
            display: none;
            padding-top: 10px;
        }

    </style>
</head>
<body>

<div id="entry-screen">
    <div class="login-card">
        <h1>Para sa Bibi ko... ❤️</h1>
        <p style="color: white; font-size: 0.9rem;">Enter our special date</p>
        <input type="text" id="dateInput" class="input-style" placeholder="September 10">
        <button class="btn-unlock" onclick="validate()">Open My Heart 😚</button>
    </div>
</div>

<div id="background-static"></div>

<div class="formal-wrapper" id="wrapper">
    <div class="formal-block">
        
        <div class="media-area" id="mediaBlock">
            <video id="vid" loop playsinline>
                <source src="rema.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-area" id="typewriter"></div>
        <div id="signature" style="padding: 0 40px 20px 40px;">From your Alang ❤️</div>
    </div>
</div>

<script>
    // THE EXACT ORIGINAL WORDS PRESERVED
    const myWords = `My bibi remrem,
 
Happy Monthsary, bibi ko😚. pakiss nga, sge na kasi. Iloveyouuu😚. iloveyou ngaa, ayaw mo na talaga sa'kin. Imissyouuuu hehe. bibii, hiii haha anong oras mo na kaya to mababasa. Kamusta ikaw bibi ko? d na kita masyadong naka musta talaga. bibii, mag ingat ikaw palagi dyan po a, palagi ko yan sinasabi sayo pero sana seryosohin mo, kung magmomotor ka dapat 10 lang d aabot ng 20 haha oa yarn?

Mahal, thank you a. thank you po kasi palagi mo iniintindi tong pagiging ano ko sa sarili po, alam kong minsan d mo nalang inaano naramdaman mo kasi mas initindi mo ko. sorry po. bibi, valid feelings mo a, kaya sabihin mo sa'kin kung nasasaktan ikaw a.

Nalagpasan natin yung 6 months haha 7 months na tayo, ang galing natin o HAHAHAHA. kahit minsan alam kong nagtatampo na din ikaw sa'kin, ako din HAHAHA tsar. 

Sumakit ba ulo mo habang binabasa mo to mahal?, pagaling ikaw bibi a. wag na magpuyat po. pero kasalanan ko din minsan kasi ang tagal kong matulog tas tong asawa ko nmn tinatry na hintayin ako, ang tigas din e. pero bibi, alam ko nmn na miss na miss mo ko dyan at gusto mo ko makachat pa pero sana mas uunahin mo health mo a. wag mo sana isipin na d kita gusto kausap po, ayaw ko lang na nagpupuyat ikaw katulad ko. tsaka sabik na sabik din ikaw na makausap ka, pero mas importante tulog mo kesa magpuyat talaga mahal. kahit saan banda natin tignan, mali talaga pero mali ko din? sorry pooo, iloveyou po.

Mahal, hintayin mo'kong yumaman a. bibilhan kita ng aso, baka. bilhin ko din pagkatao mo para kahit umayaw ka pag inaya kita e d ka maka hindi HAHAHAHA ay, joke( bakit ka nmn kasi aayaw kasii? HAHAHAHA)

Mahalllll, wag ikaw mag pakiss sa kung kanino a sa'kin lang dapat yan, akin lang po a. sorry. dapat a? hehe

bibi, ang mahalaga ang importante kaya fighting langg!🤘 
 
ILOVEYOU, BIBIII KO (MAHAL, ASAWA, REMREM, BOI, TEH, BRO)`;

    function validate() {
        const input = document.getElementById('dateInput').value.toLowerCase();
        
        if(input.includes("september 10") || input.includes("sept 10")) {
            // 1. Confetti
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // 2. Elegantly fade Stage 1
            document.getElementById('entry-screen').style.opacity = "0";
            document.getElementById('entry-screen').style.transform = "scale(0.8)";
            
            setTimeout(() => {
                // 3. Reveal Step 2
                document.getElementById('entry-screen').style.display = "none";
                document.getElementById('background-static').style.display = "block";
                document.getElementById('vid').style.display = "block";
                document.getElementById('wrapper').style.display = "flex";
                
                // 4. Guaranteed Video Play with Sound
                const vid = document.getElementById('vid');
                vid.muted = false;
                vid.play();
                
                // 5. Typing effect (starts 1 second after video reveal)
                setTimeout(typeEffect, 1000);
            }, 1000);
        } else {
            alert("Bibi naman, maling date a! 😚");
        }
    }

    let charIndex = 0;
    function typeEffect() {
        const target = document.getElementById('typewriter');
        const textArea = document.querySelector('.text-area');

        if (charIndex < myWords.length) {
            target.innerHTML += myWords.charAt(charIndex);
            charIndex++;
            // Keeps the scroll synced to the bottom so text is never cut off
            textArea.scrollTop = textArea.scrollHeight;
            setTimeout(typeEffect, 40); 
        } else {
            document.getElementById('signature').style.display = "block";
            // Final scroll just in case
            textArea.scrollTop = textArea.scrollHeight;
        }
    }
</script>

</body>
</html>
